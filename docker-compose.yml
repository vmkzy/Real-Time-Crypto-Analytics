services:
  db:
    image: postgres:16
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - ./postgres-data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    env_file:
      - .env
    environment:
      DB_HOST: db
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "8080:8080"
    volumes:
      - ./my_analytics_charts:/app/charts:ro
    depends_on:
      - db
    restart: unless-stopped

  ingestor:
    build:
      context: .
      dockerfile: Dockerfile.ingestor
    env_file:
      - .env
    depends_on:
      - backend
    command: python Python/sender.py
    restart: unless-stopped

  analytics:
    build:
      context: .
      dockerfile: Dockerfile.ingestor
    env_file:
      - .env
    environment:
      DB_HOST: db
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - ./my_analytics_charts:/app/charts
    command: python Python/main.py
    depends_on:
      - db
    restart: unless-stopped
